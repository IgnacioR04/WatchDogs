<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WATCHDOG — Smart Money Tracker</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
<style>
  :root {
    --bg:#0a0e13; --bg-elev:#11161f; --bg-elev2:#171e29; --bg-elev3:#1e2733;
    --border:#222c3a; --border-soft:#1a232f;
    --text:#e8eef5; --text-dim:#8b97a8; --text-faint:#5a6575;
    --accent:#5b9dff; --green:#3fb950; --green-soft:#2ea04322; --red:#f85149; --red-soft:#f8514922;
    --yellow:#e3b341; --purple:#bc8cff; --orange:#e0843c; --teal:#39c5cf; --pink:#f778ba;
    --shadow:0 1px 3px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.18);
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif; font-size:13px; -webkit-font-smoothing:antialiased; }
  .mono { font-family:ui-monospace,'SF Mono','JetBrains Mono',Consolas,Menlo,monospace; font-variant-numeric:tabular-nums; }
  a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
  header { padding:16px 26px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    background:linear-gradient(180deg,#0d121a 0%,var(--bg) 100%); }
  header h1 { margin:0; font-size:17px; font-weight:800; letter-spacing:0.06em; display:flex; align-items:center; gap:9px; }
  header .sub { color:var(--text-dim); font-size:11.5px; margin-top:2px; }
  header .meta { color:var(--text-dim); font-size:11.5px; text-align:right; line-height:1.7; }
  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; box-shadow:0 0 6px currentColor; }
  .ok{ background:var(--green); color:var(--green); } .warning{ background:var(--yellow); color:var(--yellow); } .error{ background:var(--red); color:var(--red); }
  .container { padding:18px 26px 60px; max-width:1560px; margin:0 auto; }
  .tabs { display:flex; gap:4px; margin-bottom:20px; flex-wrap:wrap; }
  .tab { padding:7px 14px; background:var(--bg-elev); border:1px solid var(--border-soft); color:var(--text-dim); cursor:pointer;
    font-family:inherit; font-size:12.5px; font-weight:500; border-radius:8px; white-space:nowrap; transition:all .12s; }
  .tab:hover { color:var(--text); border-color:var(--border); }
  .tab.active { color:#fff; background:linear-gradient(135deg,var(--accent),#4178d4); border-color:var(--accent); box-shadow:0 2px 10px rgba(91,157,255,.25); }
  .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .toolbar input, .toolbar select { background:var(--bg-elev2); color:var(--text); border:1px solid var(--border); padding:7px 11px; border-radius:7px; font-family:inherit; font-size:13px; }
  .toolbar input:focus, .toolbar select:focus { outline:none; border-color:var(--accent); }
  .toolbar label { color:var(--text-dim); font-size:12px; display:flex; gap:6px; align-items:center; }
  table { width:100%; border-collapse:collapse; background:var(--bg-elev); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  th,td { padding:8px 12px; text-align:left; border-bottom:1px solid var(--border-soft); white-space:nowrap; }
  th { background:var(--bg-elev2); color:var(--text-dim); font-weight:600; cursor:pointer; user-select:none; position:sticky; top:0; font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  tbody tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--bg-elev2); }
  td.num { text-align:right; } .mono, td.num { font-variant-numeric:tabular-nums; }
  .pos { color:var(--green); } .neg { color:var(--red); } .neu { color:var(--text-dim); }
  .pill { display:inline-block; padding:2px 7px; border-radius:20px; font-size:10.5px; font-weight:600; background:var(--bg-elev3); border:1px solid var(--border); margin-right:3px; color:var(--text-dim); }
  .pill.buy{ color:var(--green); border-color:#2ea04355; background:var(--green-soft); }
  .pill.sell{ color:var(--red); border-color:#f8514955; background:var(--red-soft); }
  .pill.cross{ color:var(--purple); border-color:#bc8cff55; background:#bc8cff18; }
  .card { background:var(--bg-elev); border:1px solid var(--border); border-radius:12px; padding:16px 18px; box-shadow:var(--shadow); }
  .card h3 { margin:0 0 14px 0; font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.07em; font-weight:700; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .grid { display:grid; gap:14px; }
  .g2 { grid-template-columns:1fr 1fr; } .g3 { grid-template-columns:repeat(3,1fr); } .g4 { grid-template-columns:repeat(4,1fr); }
  .g-2-1 { grid-template-columns:2fr 1fr; } .g-1-1-1 { grid-template-columns:1fr 1fr 1fr; }
  @media (max-width:1000px){ .g2,.g3,.g4,.g-2-1,.g-1-1-1 { grid-template-columns:1fr; } }
  .kpi { background:linear-gradient(150deg,var(--bg-elev2),var(--bg-elev)); border:1px solid var(--border); border-radius:14px; padding:16px 18px; position:relative; overflow:hidden; box-shadow:var(--shadow); }
  .kpi .label { color:var(--text-dim); font-size:11px; text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
  .kpi .value { font-size:30px; font-weight:800; margin-top:6px; line-height:1; letter-spacing:-.02em; }
  .kpi .foot { color:var(--text-faint); font-size:11px; margin-top:7px; }
  .kpi .accent-bar { position:absolute; left:0; top:0; bottom:0; width:4px; }
  /* idea cards */
  .ideacard { background:linear-gradient(135deg,var(--bg-elev2),var(--bg-elev)); border:1px solid var(--border); border-left:3px solid var(--green); border-radius:12px; padding:14px 16px; box-shadow:var(--shadow); }
  .ideacard.sell { border-left-color:var(--red); }
  .ideacard .tkrow { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .ideacard .tk { font-size:21px; font-weight:800; line-height:1; }
  .ideacard .co { color:var(--text-faint); font-size:10.5px; margin-top:3px; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .signal-badge { padding:4px 11px; border-radius:20px; font-weight:800; font-size:11px; white-space:nowrap; }
  .evline { font-size:11.5px; color:var(--text-dim); padding:3px 0; line-height:1.45; }
  .evline b { color:var(--text); font-weight:600; }
  .evline .ico { margin-right:4px; }
  .ideanews { margin-top:9px; padding-top:9px; border-top:1px solid var(--border-soft); font-size:11px; }
  .whalecard { background:var(--bg-elev2); border:1px solid var(--border); border-radius:11px; padding:13px 15px; }
  .whalecard .wr { font-size:24px; font-weight:800; line-height:1; }
  .bigrow { display:flex; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid var(--border-soft); font-size:12.5px; }
  .bigrow:last-child { border-bottom:none; }
  .bigrow .ico { font-size:15px; } .bigrow .amt { margin-left:auto; font-weight:700; }
  .move { display:flex; gap:12px; align-items:center; padding:11px 0; border-bottom:1px solid var(--border-soft); }
  .move:last-child { border-bottom:none; }
  .move .rank { color:var(--text-faint); font-weight:800; min-width:24px; font-size:14px; }
  .move .body { flex:1; min-width:0; } .move .t { font-weight:600; font-size:13px; } .move .s { color:var(--text-dim); font-size:11px; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ranking { display:flex; flex-direction:column; gap:7px; max-height:360px; overflow-y:auto; }
  .ranking-row { display:flex; justify-content:space-between; gap:8px; align-items:center; font-size:12.5px; }
  .truncate { max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .scorebadge { padding:3px 9px; border-radius:20px; font-weight:800; font-size:11px; font-variant-numeric:tabular-nums; }
  .loading,.error { padding:70px; text-align:center; color:var(--text-dim); } .error { color:var(--red); }
  .legend { display:flex; gap:14px; flex-wrap:wrap; font-size:11px; color:var(--text-dim); margin-top:10px; }
  .legend span { display:flex; align-items:center; gap:5px; }
  .dot { width:9px; height:9px; border-radius:3px; display:inline-block; }
  details { background:var(--bg-elev2); border:1px solid var(--border-soft); border-radius:8px; padding:9px 13px; margin-top:7px; }
  details summary { cursor:pointer; } details[open] summary { color:var(--accent); margin-bottom:9px; }
  .sectiontitle { font-size:15px; font-weight:800; margin:4px 0 12px; display:flex; align-items:center; gap:8px; }
  .sectiontitle .hint { font-size:11px; font-weight:400; color:var(--text-faint); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useCallback } = React;
const DATA_BASE = (() => {
  if (location.hostname.endsWith("github.io"))
    return location.pathname.replace(/\/dashboard\/.*$/, "") + "/data/public/";
  return "../data/public/";
})();
const FILES = {
  manifest:"manifest_public.json", health:"health_report.json", latest:"latest.json",
  signals:"signals_30d.json", movements:"top_movements_30d.json", llm:"llm_context_30d.json",
  insiders:"sec_insiders_30d.json", holders:"sec_13d_13g_30d.json", congress:"congress_trades_30d.json",
  holdings:"institutional_holdings_latest.json", changes:"institutional_changes_latest.json",
  smart:"polymarket_smart_traders.json", whales:"polymarket_whales.json", news:"news_context_30d.json",
};
const SRC_COLOR = { corporate_insider:"var(--accent)", congress:"var(--purple)", institutional:"var(--orange)", large_holder:"var(--teal)" };
const SRC_LABEL = { corporate_insider:"Insiders", congress:"Congreso", institutional:"Fondos 13F", large_holder:"13D/13G" };
const SRC_ICON = { corporate_insider:"👔", congress:"🏛️", institutional:"🏦", large_holder:"📊" };
const fmtNum=(n,dp=0)=>(n==null||isNaN(n))?"-":Number(n).toLocaleString("en-US",{minimumFractionDigits:dp,maximumFractionDigits:dp});
const fmtUsd=(n)=>{ if(n==null||isNaN(n))return "-"; const a=Math.abs(n),s=n<0?"-":""; if(a>=1e9)return s+"$"+(a/1e9).toFixed(2)+"B"; if(a>=1e6)return s+"$"+(a/1e6).toFixed(2)+"M"; if(a>=1e3)return s+"$"+(a/1e3).toFixed(1)+"K"; return s+"$"+fmtNum(a); };
const scoreColor=(s)=>s>=80?"var(--red)":s>=65?"var(--orange)":s>=50?"var(--yellow)":"var(--text-dim)";
const dirClass=(d)=>d==="buy"||d==="stake"?"pos":d==="sell"?"neg":"neu";
const ScoreBadge=({s})=><span className="scorebadge mono" style={{background:scoreColor(s)+"22",color:scoreColor(s)}}>{Math.round(s)}</span>;

// texto de accion legible por fuente+direccion
function actionText(s){
  const st=s.source_type, dir=s.direction;
  if(st==="large_holder") return s.ownership_pct!=null?`declara ${s.ownership_pct}% del capital`:"declara participación";
  if(st==="institutional") return dir==="buy"?"aumentó posición":"redujo posición";
  if(dir==="buy") return "compró"; if(dir==="sell") return "vendió"; if(dir==="stake") return "tomó participación"; return s.direction||"operó";
}
function EvLine({s}){
  const amt = s.ownership_pct!=null && s.source_type==="large_holder" ? "" : (s.amount_estimated?fmtUsd(s.amount_estimated):"");
  return (<div className="evline"><span className="ico">{SRC_ICON[s.source_type]||"•"}</span>
    <b>{s.actor_name||SRC_LABEL[s.source_type]}</b> {actionText(s)} {amt&&<b className="mono">{amt}</b>} {s.event_date?<span style={{color:"var(--text-faint)"}}>· {String(s.event_date).slice(5)}</span>:""}</div>);
}

// ============ CHARTS ============
function Donut({ segments, size=130, thickness=18 }) {
  const total=segments.reduce((s,x)=>s+x.value,0)||1;
  const r=(size-thickness)/2, cx=size/2, cy=size/2, C=2*Math.PI*r; let offset=0;
  return (<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--bg-elev3)" strokeWidth={thickness}/>
    {segments.map((s,i)=>{ const len=C*(s.value/total); const el=(<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={thickness} strokeDasharray={`${len} ${C-len}`} strokeDashoffset={-offset} transform={`rotate(-90 ${cx} ${cy})`}/>); offset+=len; return el; })}
    <text x={cx} y={cy-2} textAnchor="middle" fill="var(--text)" fontSize="20" fontWeight="800">{fmtNum(total)}</text>
    <text x={cx} y={cy+13} textAnchor="middle" fill="var(--text-dim)" fontSize="9">señales</text></svg>);
}
function HBars({ rows, color="var(--accent)", fmt=fmtNum }) {
  const max=Math.max(1,...rows.map(r=>Math.abs(r.value)));
  return (<div style={{display:"flex",flexDirection:"column",gap:8}}>
    {rows.map((r,i)=>(<div key={i}><div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}><span className="truncate" style={{maxWidth:210}}>{r.label}</span><b className="mono">{fmt(r.value)}</b></div>
      <div style={{height:7,background:"var(--bg-elev3)",borderRadius:4,overflow:"hidden"}}><div style={{width:(Math.abs(r.value)/max*100)+"%",height:"100%",background:typeof color==="function"?color(r):color,borderRadius:4}}/></div></div>))}</div>);
}
function SparkBars({ values, color="var(--accent)", height=50 }) {
  const max=Math.max(1,...values.map(v=>v.v));
  return (<div style={{display:"flex",alignItems:"flex-end",gap:2,height}}>{values.map((v,i)=>(<div key={i} title={`${v.k}: ${v.v}`} style={{flex:1,height:Math.max(2,v.v/max*height)+"px",background:color,opacity:.4+.6*(v.v/max),borderRadius:"2px 2px 0 0"}}/>))}</div>);
}

// ============ ANÁLISIS / IDEAS ============
function Analysis({ d }) {
  const signals=d.signals||[];
  const newsByTicker=useMemo(()=>{ const m={}; (d.news||[]).forEach(a=>(a.tickers_detected||[]).forEach(t=>{ (m[t]=m[t]||[]).push(a); })); return m; },[d.news]);

  // Agrega señales por ticker -> tesis de inversion. Deduplica por ACTOR
  // (un mismo insider que compra y vende se resume a su neto) y prioriza
  // tickers con varias fuentes/actores distintos comprando lo mismo.
  const ideas=useMemo(()=>{
    const m={};
    signals.forEach(s=>{ if(!s.ticker)return;
      const e=m[s.ticker]=m[s.ticker]||{ticker:s.ticker,company:s.asset_name||"",srcs:new Set(),actors:{}};
      e.srcs.add(s.source_type); if(!e.company&&s.asset_name)e.company=s.asset_name;
      const key=(s.actor_name||SRC_LABEL[s.source_type])+"|"+s.source_type;
      const a=e.actors[key]=e.actors[key]||{name:s.actor_name||SRC_LABEL[s.source_type],src:s.source_type,amt:0,pct:null,date:""};
      const amt=s.amount_estimated||0;
      a.amt += (s.direction==="sell"? -amt : amt);
      if(s.ownership_pct!=null) a.pct=s.ownership_pct;
      if(s.event_date && s.event_date>(a.date||"")) a.date=s.event_date;
    });
    return Object.values(m).map(e=>{
      const actors=Object.values(e.actors);
      // actor "comprador" = neto positivo, o un 13D/G (declarar posicion = alcista)
      const buyers=actors.filter(a=>a.amt>0 || (a.src==="large_holder" && (a.pct||0)>0 && a.amt>=0));
      const sellers=actors.filter(a=>a.amt<0);
      const netAmt=actors.reduce((s,a)=>s+a.amt,0);
      e.actors=actors.sort((a,b)=>Math.abs(b.amt)-Math.abs(a.amt));
      e.buyers=buyers.length; e.sellers=sellers.length; e.netAmt=netAmt; e.signal=netAmt>=0?"buy":"sell";
      // convicción: las FUENTES distintas pesan mucho (cross-source = señal fuerte),
      // luego nº de actores en la dirección dominante, luego el importe neto.
      const domActors=Math.max(buyers.length,sellers.length);
      e.conviction = e.srcs.size*1000 + domActors*40 + Math.min(Math.abs(netAmt)/1e6,39);
      return e;
    });
  },[signals]);
  // Una idea es relevante si: hay varias fuentes, o varios actores, o un importe
  // grande, o un 13D/G (>5% del capital). Filtra el ruido de un solo churn pequeño.
  const relevant=(e)=>e.srcs.size>=2 || e.buyers>=2 || e.sellers>=2 || Math.abs(e.netAmt)>=500000 || e.srcs.has("large_holder");
  const buyIdeas=useMemo(()=>ideas.filter(e=>e.signal==="buy"&&e.buyers>0&&relevant(e)).sort((a,b)=>b.conviction-a.conviction).slice(0,9),[ideas]);
  const sellIdeas=useMemo(()=>ideas.filter(e=>e.signal==="sell"&&relevant(e)).sort((a,b)=>b.conviction-a.conviction).slice(0,6),[ideas]);

  // Feed de operaciones grandes nombradas (congress + insider) por importe
  const bigTrades=useMemo(()=>{ return signals.filter(s=>(s.source_type==="congress"||s.source_type==="corporate_insider")&&s.ticker&&s.amount_estimated)
    .sort((a,b)=>(b.amount_estimated||0)-(a.amount_estimated||0)).slice(0,14); },[signals]);

  // Polymarket whales con WR + su apuesta principal
  const whales=useMemo(()=>{ return [...(d.smart||[]),...(d.whales||[])]
    .filter(t=>t.closed_positions>=10).sort((a,b)=>(b.smart_score||b.whale_score||0)-(a.smart_score||a.whale_score||0))
    .filter((t,i,arr)=>arr.findIndex(x=>x.wallet===t.wallet)===i).slice(0,6); },[d.smart,d.whales]);

  const bySource=useMemo(()=>{ const m={}; signals.forEach(s=>{ m[s.source_type]=(m[s.source_type]||0)+1; }); return Object.entries(m).map(([k,v])=>({label:SRC_LABEL[k]||k,value:v,color:SRC_COLOR[k]||"var(--text-dim)",key:k})); },[signals]);
  const daily=useMemo(()=>{ const m={},keys=[]; for(let i=29;i>=0;i--){ const k=new Date(Date.now()-i*864e5).toISOString().slice(5,10); m[k]=0; keys.push(k); } signals.forEach(s=>{ const dt=s.event_date||s.disclosure_date; if(!dt)return; const k=String(dt).slice(5,10); if(k in m)m[k]++; }); return keys.map(k=>({k,v:m[k]})); },[signals]);

  const ActorLine=({a})=>{ const isLH=a.src==="large_holder"&&a.pct!=null;
    return (<div className="evline"><span className="ico">{SRC_ICON[a.src]||"•"}</span>
      <b>{a.name}</b> {isLH?`declara ${a.pct}% del capital`:(a.amt>=0?"compró":"vendió")+" neto"} {!isLH&&<b className="mono">{fmtUsd(Math.abs(a.amt))}</b>} {a.date?<span style={{color:"var(--text-faint)"}}>· {String(a.date).slice(5)}</span>:""}</div>);
  };
  const IdeaCard=({e,sell})=>{ const nw=(newsByTicker[e.ticker]||[])[0];
    const shown=e.actors.filter(a=>sell?a.amt<0:(a.amt>0||(a.src==="large_holder"&&a.pct>0))).slice(0,4);
    return (<div className={"ideacard"+(sell?" sell":"")}>
      <div className="tkrow"><div><div className="tk mono">{e.ticker}</div><div className="co">{e.company}</div></div>
        <span className="signal-badge" style={{background:(sell?"var(--red)":"var(--green)")+"22",color:sell?"var(--red)":"var(--green)"}}>{sell?"VENTA":"COMPRA"} · {e.srcs.size} {e.srcs.size>1?"fuentes":"fuente"}</span></div>
      <div style={{margin:"9px 0 4px"}}>{[...e.srcs].map(s=><span className="pill" key={s} style={{color:SRC_COLOR[s]}}>{SRC_ICON[s]} {SRC_LABEL[s]}</span>)}</div>
      <div>{shown.map((a,i)=><ActorLine key={i} a={a}/>)}{e.actors.length>shown.length&&<div style={{fontSize:10.5,color:"var(--text-faint)",marginTop:2}}>+{e.actors.length-shown.length} actores más</div>}</div>
      {nw&&<div className="ideanews">📰 <a href={nw.url} target="_blank">{nw.title}</a></div>}
    </div>);
  };

  return (<>
    <div className="grid g4" style={{marginBottom:18}}>
      <div className="kpi"><div className="accent-bar" style={{background:"var(--green)"}}></div><div className="label">Ideas de compra</div><div className="value mono" style={{color:"var(--green)"}}>{buyIdeas.length}</div><div className="foot">tickers con presión compradora</div></div>
      <div className="kpi"><div className="accent-bar" style={{background:"var(--red)"}}></div><div className="label">Señales de venta</div><div className="value mono" style={{color:"var(--red)"}}>{sellIdeas.length}</div><div className="foot">tickers con presión vendedora</div></div>
      <div className="kpi"><div className="accent-bar" style={{background:"var(--purple)"}}></div><div className="label">Operaciones grandes</div><div className="value mono">{fmtNum(bigTrades.length)}</div><div className="foot">trades nombrados &gt; importe</div></div>
      <div className="kpi"><div className="accent-bar" style={{background:"var(--teal)"}}></div><div className="label">Ballenas Polymarket</div><div className="value mono" style={{color:"var(--teal)"}}>{whales.length}</div><div className="foot">con track record</div></div>
    </div>

    <div className="sectiontitle">💡 Ideas de inversión <span className="hint">tickers ordenados por convicción (más fuentes + mayor importe = más arriba). Cada línea es una operación real de smart money.</span></div>

function SortableTable({ columns, rows, initialSort, maxRows=400 }) {
  const [sort,setSort]=useState(initialSort||{key:columns[0].key,dir:"desc"});
  const sorted=useMemo(()=>{ const a=[...rows]; a.sort((x,y)=>{ const va=x[sort.key],vb=y[sort.key]; if(va===vb)return 0; if(va==null)return 1; if(vb==null)return -1; if(typeof va==="number"&&typeof vb==="number")return sort.dir==="asc"?va-vb:vb-va; return sort.dir==="asc"?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va)); }); return a.slice(0,maxRows); },[rows,sort,maxRows]);
  return (<div style={{overflowX:"auto"}}><table><thead><tr>{columns.map(c=>(<th key={c.key} onClick={()=>setSort(s=>({key:c.key,dir:s.key===c.key&&s.dir==="desc"?"asc":"desc"}))}>{c.label}{sort.key===c.key?(sort.dir==="desc"?" ↓":" ↑"):""}</th>))}</tr></thead>
    <tbody>{sorted.map((r,i)=>(<tr key={r.id||i}>{columns.map(c=>(<td key={c.key} className={c.numeric?"num mono":""}>{c.render?c.render(r):r[c.key]}</td>))}</tr>))}</tbody></table>
    {rows.length>maxRows&&<div style={{color:"var(--text-faint)",padding:"8px 2px",fontSize:11}}>mostrando {maxRows} de {fmtNum(rows.length)}</div>}</div>);
}

  useEffect(()=>{ load(); },[load]);
  const ready=d.health!==undefined;
  if(err)return (<><header><h1><img src="logo.jpg" alt="WATCHDOG" style="height:28px;width:28px;border-radius:50%;vertical-align:middle;margin-right:2px"/> WATCHDOG</h1></header><div className="error">Error: {err}<br/><br/><button onClick={load}>reintentar</button></div></>);
  if(!ready)return (<><header><h1><img src="logo.jpg" alt="WATCHDOG" style="height:28px;width:28px;border-radius:50%;vertical-align:middle;margin-right:2px"/> WATCHDOG</h1></header><div className="loading">cargando datos…</div></>);
  const overall=(d.health&&d.health.overall_status)||"";
  return (<>
    <header><div><h1><img src="logo.jpg" alt="WATCHDOG" style="height:28px;width:28px;border-radius:50%;vertical-align:middle;margin-right:2px"/> WATCHDOG</h1><div className="sub">Smart Money Tracker · dónde invierte el dinero que importa</div></div>
      <div className="meta"><span className={"status-dot "+overall}></span>{overall} · {updated&&"actualizado "+new Date(updated).toLocaleString()}<br/><a href="#" onClick={e=>{e.preventDefault();load();}}>↻ refrescar</a> · <a href={DATA_BASE+"llm_context_30d.json"} target="_blank">llm_context.json ↗</a></div></header>
    <div className="container">
      <div className="tabs">{TABS.map(([k,l])=>(<button key={k} className={"tab "+(tab===k?"active":"")} onClick={()=>setTab(k)}>{l}</button>))}</div>
      {tab==="analysis"&&<Analysis d={d}/>}
      {tab==="movements"&&<Movements d={d}/>}
      {tab==="signals"&&<Signals d={d}/>}
      {tab==="congress"&&<Congress d={d}/>}
      {tab==="insiders"&&<Insiders d={d}/>}
      {tab==="institutions"&&<Institutions d={d}/>}
      {tab==="holders"&&<Holders d={d}/>}
      {tab==="smart"&&<Polymarket rows={d.smart} scoreKey="smart_score" label="Smart"/>}
      {tab==="whales"&&<Polymarket rows={d.whales} scoreKey="whale_score" label="Whale"/>}
      {tab==="ticker"&&<TickerIntel d={d}/>}
      {tab==="quality"&&<DataQuality d={d}/>}
    </div>
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

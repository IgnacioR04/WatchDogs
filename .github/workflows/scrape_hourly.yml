name: scrape_hourly

# Pipeline principal de WATCHDOG v2. Cada hora (minuto 17 para evitar la
# congestion del minuto 00) ejecuta los scrapers, recorta a 30 dias, calcula
# el health report y commitea solo data/public/.
#
# NOTA: el sync a Google Drive (historico profundo) esta APLAZADO. Las service
# accounts no pueden subir a un Drive personal; se reactivara con OAuth.

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      dataset:
        description: "Que scrapear: all | sec | congress | polymarket"
        required: false
        default: "all"

permissions:
  contents: write

# Un solo run a la vez escribiendo en data/public/ para evitar conflictos.
concurrency:
  group: watchdog-write-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Las capas v3 (precios/macro/regimen/riesgo) leen y escriben un historico
    # de parquets/jsonl. En CI no hay Google Drive, asi que usamos un directorio
    # EFIMERO del runner: market_prices/macro_fred lo pueblan al inicio del run y
    # regimen/cartera/riesgo lo consumen en el mismo run. Se pierde al terminar
    # (cada hora se redescargan 5y frescos de yfinance/FRED), pero es suficiente.
    env:
      WATCHDOG_HISTORY_DIR: ${{ github.workspace }}/_ci_history
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historico completo para que el rebase tenga ancestros

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scrapers
        env:
          USER_AGENT_EMAIL: ${{ secrets.USER_AGENT_EMAIL }}
        run: python run_all.py "${{ github.event.inputs.dataset || 'all' }}"

      - name: Publish public 30d
        run: python -m pipelines.publish_public_30d

      - name: Build unified signals
        run: python -m pipelines.build_signals

      - name: Fetch news context (GDELT)
        run: python -m scrapers.news_gdelt

      - name: Build top movements
        run: python -m pipelines.build_top_movements

      - name: Build LLM context
        run: python -m pipelines.build_llm_context

      - name: Build health report
        run: python -m pipelines.build_health_report

      # ---- Capas v3: mercado -> regimen -> cartera -> riesgo -> briefing ----
      # Best-effort: yfinance/FRED pueden fallar desde IPs de CI; si algo falla
      # se conservan los artefactos v3 previos y el resto del pipeline sigue.
      - name: Market prices (yfinance) + archivo efimero
        continue-on-error: true
        run: python -m scrapers.market_prices

      - name: Macro (FRED)
        continue-on-error: true
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python -m scrapers.macro_fred

      - name: Market regime
        continue-on-error: true
        run: python -m regime.market_regime

      - name: Portfolio candidate (moderado)
        continue-on-error: true
        run: python -m portfolio.allocator moderado

      - name: Risk report
        continue-on-error: true
        run: python -m risk.risk_engine

      - name: Daily context (briefing .md para el LLM)
        continue-on-error: true
        run: python -m pipelines.build_daily_context

      - name: Sync with remote (rebase)
        run: |
          git config user.name "watchdog-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true

      - name: Commit & push public data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: hourly refresh [skip ci]"
          file_pattern: "data/public/*.json data/public/*.md"
          commit_user_name: "watchdog-bot"
          commit_user_email: "actions@github.com"
          push_options: "--force-with-lease"

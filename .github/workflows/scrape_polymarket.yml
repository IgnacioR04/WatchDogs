name: scrape_polymarket

# Scraping del leaderboard y top traders de Polymarket cada 15 minutos.
# Tambien ejecutable manualmente via workflow_dispatch.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

# Mismo concurrency group que los otros 2 workflows: garantiza que solo
# un workflow puede escribir en data/ a la vez en todo el repo.
concurrency:
  group: watchdog-write-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python -m scrapers.polymarket

      - name: Sync with remote (rebase)
        run: |
          git config user.name "watchdog-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true

      - name: Commit & push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: refresh polymarket [skip ci]"
          file_pattern: "data/polymarket_top_traders.json"
          commit_user_name: "watchdog-bot"
          commit_user_email: "actions@github.com"
          push_options: "--force-with-lease"

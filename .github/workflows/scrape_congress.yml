name: scrape_congress

# Scraping de trades de congresistas (House + Senate) cada 6 horas.
# Tambien ejecutable manualmente via workflow_dispatch.

# [v1 - EN PAUSA] Reemplazado por scrape_hourly.yml en la migracion v2.
on:
  workflow_dispatch:

permissions:
  contents: write

# Concurrency global compartido por los 3 workflows que escriben en data/.
# Solo uno puede correr a la vez para evitar race conditions al pushear.
concurrency:
  group: watchdog-write-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # clone completo para que pull rebase tenga ancestros

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          USER_AGENT_EMAIL: ${{ secrets.USER_AGENT_EMAIL }}
        run: python -m scrapers.congress

      - name: Sync with remote (rebase)
        run: |
          git config user.name "watchdog-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true

      - name: Commit & push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: refresh congress_trades [skip ci]"
          file_pattern: "data/congress_trades.json"
          commit_user_name: "watchdog-bot"
          commit_user_email: "actions@github.com"
          push_options: "--force-with-lease"
